services:
  postgres:
    image: postgres:17-alpine
    container_name: bravoclient-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bravoclient
      POSTGRES_USER: bravoclient
      POSTGRES_PASSWORD: bravoclient_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
